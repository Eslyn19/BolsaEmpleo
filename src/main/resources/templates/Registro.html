<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="/css/Registro.css">
</head>

<body>
    <a href="/inicio" class="btn-volver">← Volver</a>
    <input type="radio" name="mode" id="signInTab" checked hidden>
    <input type="radio" name="mode" id="signUpTab" hidden>

    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form action="/oferente/dashboard" method="post">
                <h1>Iniciar sesión</h1>
                <input type="text" name="usuario" placeholder="Usuario" autocomplete="off">
                <input type="password" name="clave" placeholder="Contraseña">
                <button type="submit">Ingresar</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Bienvenido/a!</h1>
                    <p>Para mantenerse conectado con nosotros, inicia sesión con tu información personal.</p>
                </div>

                <div class="overlay-panel overlay-right">
                    <h1>Hola, amigo/a!</h1>
                    <p>Accede a tu cuenta y descubre oportunidades para crecer profesionalmente.</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
