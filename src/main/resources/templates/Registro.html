<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="/css/Registro.css">
    <link rel="icon" href="/images/loginIcon.png" type="image/x-icon">
</head>

<body>
    <a href="/inicio" class="btn-volver">← Volver</a>
    <input type="radio" name="mode" id="signInTab" checked hidden>
    <input type="radio" name="mode" id="signUpTab" hidden>

    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form action="/admin/login" method="post">

                <h1>Usuario</h1>
                <div th:if="${error}" th:text="${error}" class="error"></div>
                <input type="text" name="identificacion" placeholder="Identificación" autocomplete="off">
                <h2>Contraseña</h2>
                <input type="password" name="clave" placeholder="Contraseña">

                <button type="submit">Ingresar</button>

            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Bienvenido/a!</h1>
                    <p>Para mantenerse conectado con nosotros, inicia sesión con tu información personal.</p>
                </div>

                <div class="overlay-panel overlay-right">
                    <h1>Hola, amigo/a!</h1>
                    <p>Introduce tus datos personales y comienza tu busqueda con nosotros</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
