<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Oferente</title>
    <link rel="stylesheet" href="/css/DashboardOferente.css">
</head>
<body>
<div th:replace="~{fragments/fragments :: header}"></div>
<main class="dashboard-container">
    <h1>Oferente - Dashboard</h1>
    <h3>Administra tus habilidades y CV</h3>
    <p style="margin-top:12px;color:rgba(255,255,255,0.8);">
        Oferente logeado:
        <span th:text="${session.usuarioNombre}"></span>
        <span th:text="${session.usuarioPrimerAp}"></span>
    </p>
    <div class="button-row">
        <button onclick="location.href='/oferente/habilidades'">Mis destrezas</button>
        <button onclick="location.href='/oferente/cv'">Mi CV</button>
    </div>
</main>
<div th:replace="~{fragments/fragments :: footer}"></div>
</body>
</html>
