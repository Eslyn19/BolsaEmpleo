<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatos</title>
    <link rel="stylesheet" th:href="@{/css/AdministradorView.css}">
    <link rel="stylesheet" th:href="@{/css/EmpresaPuestos.css}">
</head>
<body>

<div th:replace="~{fragments/navbarEmpresa :: navbar}"></div>

<main class="main-content main-empresa-puestos">
    <section class="dashboard-hero">
        <h1 style="font-size:clamp(22px,2.3vw,30px);">Buscar candidatos</h1>
        <p style="margin-top:8px;color:rgba(255,255,255,0.72);">
            Puesto <span th:text="${idPuesto}">0</span> — esta sección estará disponible próximamente.
        </p>
        <p style="margin-top:18px;">
            <a class="emp-puesto-link" th:href="@{/empresa/buscar-puestos}">← Volver a buscar candidatos</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>
</body>
</html>
