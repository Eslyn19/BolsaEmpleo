<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar puesto</title>
    <link rel="stylesheet" th:href="@{/css/AdministradorView.css}">
    <link rel="stylesheet" th:href="@{/css/EmpresaPuestos.css}">
</head>
<body>

<div th:replace="~{fragments/navbarEmpresa :: navbar}"></div>

<main class="main-content main-empresa-puestos">
    <section class="dashboard-hero">
        <div>
            <h1 style="font-size:clamp(22px,2.3vw,30px);">Publicar puesto</h1>
            <p style="margin-top:8px;color:rgba(255,255,255,0.72);">Describe el rol y el salario ofrecido.</p>
        </div>

        <div th:if="${error}" th:text="${error}" class="emp-puesto-msg emp-puesto-msg--err"></div>

        <form class="emp-puesto-form" th:action="@{/empresa/puestos}" method="post">
            <label class="emp-puesto-field">
                <span class="emp-puesto-label">Descripción</span>
                <input class="emp-puesto-input" type="text" name="descripcion" required maxlength="100"
                       placeholder="Ej. Desarrollador backend Java">
            </label>
            <label class="emp-puesto-field">
                <span class="emp-puesto-label">Salario</span>
                <input class="emp-puesto-input" type="number" name="salario" required min="0" step="0.01"
                       placeholder="0.00">
            </label>

            <div class="emp-puesto-field" th:if="${!#lists.isEmpty(caracteristicasDisponibles)}">
                <span class="emp-puesto-label">Características del puesto</span>
                <p class="emp-puesto-hint-inline">Marca las que aplican (solo activas en catálogo).</p>
                <div class="emp-puesto-chips">
                    <label th:each="car : ${caracteristicasDisponibles}" class="emp-puesto-chip">
                        <input type="checkbox" name="idCaracteristica" th:value="${car.id}">
                        <span th:text="${car.nombre}"></span>
                    </label>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(caracteristicasDisponibles)}" class="emp-puesto-hint-inline">No hay características activas en el catálogo.</p>

            <div class="emp-puesto-actions">
                <a class="emp-puesto-link" th:href="@{/empresa/puestos}">Volver a mis puestos</a>
                <button type="submit" class="emp-puesto-btn">Enviar</button>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>
</body>
</html>
