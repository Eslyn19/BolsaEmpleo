<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis puestos</title>
    <link rel="stylesheet" th:href="@{/css/AdministradorView.css}">
    <link rel="stylesheet" th:href="@{/css/EmpresaPuestos.css}">
</head>
<body>

<div th:replace="~{fragments/navbarEmpresa :: navbar}"></div>

<main class="main-content main-empresa-puestos">
    <section class="dashboard-hero">
        <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px;">
            <div>
                <h1 style="font-size:clamp(22px,2.3vw,30px);">Mis puestos</h1>
                <p style="margin-top:8px;color:rgba(255,255,255,0.72);">Puestos publicados por tu empresa.</p>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                <a class="emp-puesto-link" th:href="@{/empresa/buscar-puestos}">Buscar candidatos</a>
                <a class="emp-puesto-btn emp-puesto-btn--inline" th:href="@{/empresa/puestos/publicar}">Publicar puesto</a>
            </div>
        </div>

        <div th:if="${msgOk}" th:text="${msgOk}" class="emp-puesto-msg emp-puesto-msg--ok"></div>

        <div th:if="${#lists.isEmpty(puestos)}" style="margin-top:18px;">
            <p style="color:rgba(255,255,255,0.72);">Aún no has publicado puestos.</p>
        </div>

        <div th:if="${!#lists.isEmpty(puestos)}" style="margin-top:18px;overflow-x:auto;">
            <table class="emp-puesto-table">
                <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Salario</th>
                    <th>Características</th>
                    <th>Acceso</th>
                    <th>Estado</th>
                    <th>Gestión</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${puestos}">
                    <td th:text="${p.descripcion}"></td>
                    <td th:text="${p.salario}"></td>
                    <td class="emp-puesto-cars">
                        <span th:if="${#lists.isEmpty(p.caracteristicas)}" class="emp-puesto-muted">—</span>
                        <span th:each="car, it : ${p.caracteristicas}">
                            <span th:text="${car.nombre}"></span><span th:if="${!it.last}">, </span>
                        </span>
                    </td>
                    <td style="white-space:nowrap;font-size:13px;">
                        <span th:if="${p.acceso != null and p.acceso == 1}" style="color:rgba(34,197,94,0.9);">Público</span>
                        <span th:if="${p.acceso == null or p.acceso == 0}" style="color:rgba(148,163,184,0.95);">Privado</span>
                        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
                            <form th:if="${p.acceso == null or p.acceso == 0}" th:action="@{/empresa/puestos/{id}/acceso-publico(id=${p.id})}" method="post" style="display:inline;">
                                <button type="submit" class="emp-puesto-btn" style="padding:6px 10px;font-size:12px;">Hacer público</button>
                            </form>
                            <form th:if="${p.acceso != null and p.acceso == 1}" th:action="@{/empresa/puestos/{id}/acceso-privado(id=${p.id})}" method="post" style="display:inline;">
                                <button type="submit" style="padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.88);cursor:pointer;">Hacer privado</button>
                            </form>
                        </div>
                    </td>
                    <td>
                        <span th:if="${p.oferenteAsignado != null}" style="color:rgba(147,197,253,0.95);">
                            Cerrado — asignado a <span th:text="|${p.oferenteAsignado.nombre} ${p.oferenteAsignado.apellido}|">—</span>
                        </span>
                        <span th:if="${p.oferenteAsignado == null and p.activo != null and p.activo == 1}" style="color:rgba(34,197,94,0.9);">Activo</span>
                        <span th:if="${p.oferenteAsignado == null and (p.activo == null or p.activo == 0)}" style="color:rgba(248,113,113,0.9);">Inactivo</span>
                    </td>
                    <td class="emp-puesto-actions-cell">
                        <form th:if="${p.oferenteAsignado == null and p.activo != null and p.activo == 1}" th:action="@{/empresa/puestos/{id}/desactivar(id=${p.id})}" method="post" style="display:inline;">
                            <button type="submit" class="emp-puesto-btn-icon" title="Desactivar"><img th:src="@{/images/TurnOn.png}" alt="Desactivar" width="28" height="28"></button>
                        </form>
                        <form th:if="${p.oferenteAsignado == null and (p.activo == null or p.activo == 0)}" th:action="@{/empresa/puestos/{id}/activar(id=${p.id})}" method="post" style="display:inline;">
                            <button type="submit" class="emp-puesto-btn-icon" title="Activar"><img th:src="@{/images/turnOff.png}" alt="Activar" width="28" height="28"></button>
                        </form>
                        <span th:if="${p.oferenteAsignado != null}" class="emp-puesto-muted" style="font-size:12px;">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>
</body>
</html>
