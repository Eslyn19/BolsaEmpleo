<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oferente - Habilidades</title>
    <link rel="stylesheet" href="/css/DashboardOferente.css">
</head>
<body>
<!-- Encabezado -->
<div th:replace="~{fragments/fragments :: header}"></div>

<!-- Contenido -->
<main class="dashboard-container habilidades-layout">
    <!-- Cuadro 1: Izquierda -->
    <section class="panel panel-left">
        <h2>Mis destrezas</h2>
        <ul>
            <!-- Aquí Thymeleaf iterará sobre las destrezas de la BD -->
            <li th:each="habilidad : ${habilidades}">
                <span th:text="${habilidad.nombre}"></span>
                - Nivel <span th:text="${habilidad.nivel}"></span>
            </li>
        </ul>
    </section>

    <!-- Cuadro 2: Medio -->
    <section class="panel panel-middle">
        <!-- Barra de navegación estilo breadcrumbs -->
        <div class="ruta">
            <form th:each="segmento : ${rutaActual}"
                  th:action="@{/oferente/ruta}" method="post">
                <input type="hidden" name="segmentoId" th:value="${segmento.id}" />
                <button type="submit" class="ruta-boton" th:text="${segmento.nombre}"></button>
            </form>
        </div>

        <!-- Lista de subcategorías/habilidades -->
        <h3 th:text="'Subcategorías de: ' + ${categoriaActual.nombre}"></h3>
        <table>
            <tr th:each="hab : ${subHabilidades}">
                <td th:text="${hab.nombre}"></td>
                <td>
                    <form th:action="@{/oferente/entrar}" method="post">
                        <input type="hidden" name="habilidadId" th:value="${hab.id}" />
                        <button type="submit"
                                th:disabled="${#lists.contains(destrezasOferente.?[destreza.id], hab.id)}">
                            Entrar
                        </button>
                    </form>
                </td>
            </tr>
        </table>
    </section>


    <!-- Cuadro 3: Derecha -->
    <section class="panel panel-right">
        <h2>Agregar habilidad</h2>
        <select>
            <option th:each="h : ${habilidadesFiltradas}" th:text="${h.nombre}"></option>
        </select>
        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
        </select>
        <button class="btn-agregar">Agregar</button>
    </section>
</main>

<!-- Pie de página -->
<div th:replace="~{fragments/fragments :: footer}"></div>
</body>
</html>
