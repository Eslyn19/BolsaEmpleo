<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferentes pendientes</title>
    <link rel="stylesheet" href="/css/AdministradorView.css">
</head>
<body>
<div th:replace="~{fragments/navbarAdministrador :: navbar}"></div>

<main class="main-content">
    <section class="dashboard-hero">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
            <div>
                <h1 style="font-size:clamp(22px,2.3vw,30px);">Oferentes pendientes</h1>
                <p style="margin-top:8px;color:rgba(255,255,255,0.72);">Revisa y aprueba perfiles en espera.</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(pendientes)}" style="margin-top:18px;">
            <p style="color:rgba(255,255,255,0.72);">No hay oferentes pendientes.</p>
        </div>

        <div th:if="${!#lists.isEmpty(pendientes)}" style="margin-top:18px;overflow-x:auto;">
            <table style="width:100%;border-collapse:separate;border-spacing:0;min-width:760px;">
                <thead>
                <tr>
                    <th style="text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.92);">Identificación</th>
                    <th style="text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.92);">Nombre</th>
                    <th style="text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.92);">Apellido</th>
                    <th style="text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.92);">Correo</th>
                    <th style="text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.92);">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${pendientes}">
                    <td style="padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);"> <span th:text="${o.idUsuario}"></span></td>
                    <td style="padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);"> <span th:text="${o.nombre}"></span></td>
                    <td style="padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);"> <span th:text="${o.apellido}"></span></td>
                    <td style="padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);"> <span th:text="${o.correo}"></span></td>
                    <td style="padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;">
                        <form th:action="@{'/admin/oferentes/' + ${o.idUsuario} + '/aprobar'}" method="post" style="display:inline;margin-right:8px;">
                            <button type="submit" style="padding:10px 12px;border-radius:12px;border:1px solid rgba(34,197,94,0.35);background:rgba(34,197,94,0.12);color:rgba(255,255,255,0.92);cursor:pointer;">Aprobar</button>
                        </form>
                        <form th:action="@{'/admin/oferentes/' + ${o.idUsuario} + '/rechazar'}" method="post" style="display:inline;">
                            <button type="submit" style="padding:10px 12px;border-radius:12px;border:1px solid rgba(239,68,68,0.35);background:rgba(239,68,68,0.12);color:rgba(255,255,255,0.92);cursor:pointer;">Rechazar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>
</body>
</html>
