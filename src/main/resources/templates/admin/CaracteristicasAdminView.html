<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Características</title>
    <link rel="stylesheet" th:href="@{/css/AdministradorView.css}">
    <link rel="stylesheet" th:href="@{/css/CaracteristicasAdmin.css}">
</head>
<body>

<div th:replace="~{fragments/navbarAdministrador :: navbar}"></div>

<main class="main-content main-caracteristicas">
    <section class="dashboard-hero">
        <div>
            <h1 style="font-size:clamp(22px,2.3vw,30px);">Características</h1>
            <p style="margin-top:8px;color:rgba(255,255,255,0.72);">Gestión del catálogo jerárquico de habilidades y categorías.</p>
        </div>

        <div class="cat-admin-layout">
            <div class="cat-panel cat-panel-nav">
                <div class="cat-ruta">
                    <span class="cat-ruta-label">Ruta:</span>
                    <a class="cat-btn-raices" th:href="@{/admin/caracteristicas}">Raíces</a>
                </div>
                <p class="cat-categorias-title" th:text="'Categorías: ' + ${etiquetaCategoria}">Categorías: raíces</p>
                <a th:if="${parentId != null and volverRaices}" class="cat-btn-volver" th:href="@{/admin/caracteristicas}">Volver</a>
                <a th:if="${parentId != null and !volverRaices}" class="cat-btn-volver" th:href="@{/admin/caracteristicas(parentId=${volverPid})}">Volver</a>
                <div class="cat-list-wrap">
                    <div th:if="${#lists.isEmpty(items)}" class="cat-empty">No hay características en este nivel.</div>
                    <div class="cat-row" th:each="c : ${items}">
                        <span class="cat-row-name" th:text="${c.nombre}"></span>
                        <a th:if="${raizPasivaId == null or c.id != raizPasivaId}" class="cat-btn-entrar" th:href="@{/admin/caracteristicas(parentId=${c.id})}">Entrar</a>
                    </div>
                </div>
            </div>

            <div class="cat-panel cat-panel-form">
                <h2 class="cat-form-title">Agregar Característica</h2>
                <p th:if="${#lists.isEmpty(padresSelect)}" class="cat-empty">No hay tecnologías disponibles como padre. Crea primero la jerarquía base.</p>
                <form th:if="${!#lists.isEmpty(padresSelect)}" class="cat-form" th:action="@{/admin/caracteristicas}" method="post">
                    <label class="cat-field">
                        <span class="cat-field-label">Nombre</span>
                        <input class="cat-input" type="text" name="nombre" required maxlength="45">
                    </label>
                    <label class="cat-field">
                        <span class="cat-field-label">Padre</span>
                        <select class="cat-select" name="idPadre" required>
                            <option th:each="p : ${padresSelect}" th:value="${p.id}" th:text="${p.nombre}"></option>
                        </select>
                    </label>
                    <button class="cat-btn-crear" type="submit">Crear</button>
                </form>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>
</body>
</html>
