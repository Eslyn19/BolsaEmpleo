<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro oferente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/formIcon.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/FormOferente.css">
</head>
<body class="oferente-page">
    <a href="/inicio" class="oferente-back">← Volver al inicio</a>

    <main class="oferente-shell">
        <section class="oferente-card" aria-labelledby="oferente-title">
            <div class="oferente-brand">
                <img src="/images/logo.png" alt="Logo" class="oferente-logo" width="48" height="48">
                <div>
                    <h1 id="oferente-title" class="oferente-title">Registro oferente</h1>
                    <p class="oferente-sub">Completa tus datos. Un administrador revisará tu solicitud.</p>
                </div>
            </div>

            <form class="oferente-form" th:action="@{/userform}" method="post" autocomplete="off">
                <div th:if="${error}" th:text="${error}" class="oferente-error" role="alert"></div>

                <div class="oferente-grid oferente-grid--3">
                    <label class="oferente-field">
                        <span class="oferente-label">Nombre</span>
                        <input class="oferente-input" type="text" id="nombre" name="nombre" required autocomplete="off">
                    </label>
                    <label class="oferente-field">
                        <span class="oferente-label">Apellidos</span>
                        <input class="oferente-input" type="text" id="primerAp" name="primerAp" required autocomplete="off">
                    </label>
                    <label class="oferente-field">
                        <span class="oferente-label">Nacionalidad</span>
                        <input class="oferente-input" type="text" id="nacionalidad" name="nacionalidad" required autocomplete="off">
                    </label>
                </div>

                <div class="oferente-grid">
                    <label class="oferente-field">
                        <span class="oferente-label">Identificación</span>
                        <input class="oferente-input" type="text" id="identificacion" name="identificacion" required autocomplete="off">
                    </label>
                    <label class="oferente-field">
                        <span class="oferente-label">Teléfono</span>
                        <input class="oferente-input" type="tel" id="telefono" name="telefono" autocomplete="off">
                    </label>
                </div>

                <div class="oferente-grid">
                    <label class="oferente-field">
                        <span class="oferente-label">Correo</span>
                        <input class="oferente-input" type="email" id="correo" name="correo" required autocomplete="off">
                    </label>
                    <label class="oferente-field">
                        <span class="oferente-label">Lugar de residencia</span>
                        <input class="oferente-input" type="text" id="lugarResidencia" name="lugarResidencia" required autocomplete="off">
                    </label>
                </div>

                <div class="oferente-grid">
                    <label class="oferente-field">
                        <span class="oferente-label">Contraseña</span>
                        <input class="oferente-input" type="password" id="customerPassword" name="customerPassword" required autocomplete="off">
                    </label>
                    <label class="oferente-field">
                        <span class="oferente-label">Confirmar contraseña</span>
                        <input class="oferente-input" type="password" id="customerPasswordConfirm" name="customerPasswordConfirm" required autocomplete="off">
                    </label>
                </div>

                <p class="oferente-hint">Tu cuenta quedará pendiente hasta ser aprobada.</p>
                <button type="submit" class="oferente-submit">Enviar registro</button>
            </form>
        </section>
    </main>
</body>
</html>
