# Solo con base de datos VACÍA (o tras DROP DATABASE). Si ya hay datos, data.sql fallará por duplicados.
# Ejemplo: mvn spring-boot:run -Dspring-boot.run.profiles=seed
# En IDE: Active profiles = seed  (quita "seed" el resto del tiempo para no forzar el script)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
