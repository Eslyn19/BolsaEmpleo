spring.application.name=P1BolsaEmpleo
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Mishichacon26!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update = compara entidades JPA con tablas YA existentes: crea lo que falta y añade columnas;
# no borra datos ni tira tabellas enteras (evita create / create-drop en desarrollo con datos).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# No ejecutar data.sql en cada arranque: así no chocan INSERT duplicados y no hace falta vaciar MySQL.
spring.sql.init.mode=never
# Con mode=never no hay script de datos que esperar; Hibernate aplica el esquema en el arranque habitual.
spring.jpa.defer-datasource-initialization=false
