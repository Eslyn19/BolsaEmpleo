<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard empresa</title>
    <link rel="stylesheet" th:href="@{/css/AdministradorView.css}">
</head>
<body>

<div th:replace="~{fragments/navbarEmpresa :: navbar}"></div>

<main class="main-content">
    <section class="dashboard-hero">
        <div class="hero-text">
            <h1>Panel empresa</h1>
            <p style="margin-top:8px;">Bienvenido, <span th:text="${empresaNombre}">Empresa</span>.</p>
        </div>
    </section>

    <section class="dashboard-cards">
        <a th:href="@{/empresa/puestos}" class="card">
            <div class="card-icon">📋</div>
            <div class="card-info">
                <h3>Buscar puesto</h3>
                <p>Ver tus puestos publicados, publicar nuevos y gestionar el estado.</p>
            </div>
        </a>

        <a th:href="@{/empresa/buscar-puestos}" class="card">
            <div class="card-icon">👥</div>
            <div class="card-info">
                <h3>Buscar candidatos</h3>
                <p>Elegir un puesto activo para buscar perfiles que encajen.</p>
            </div>
        </a>
    </section>
</main>

<div th:replace="~{fragments/footerAdministrador :: footer}"></div>

</body>
</html>
